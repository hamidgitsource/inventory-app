<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📦 سیستم هوشمند انبارداری و جانمایی</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- کتابخانه‌های مورد نیاز -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { font-family: Tahoma, Arial, sans-serif; }
    #suggestionsList::-webkit-scrollbar { width: 6px; }
    #suggestionsList::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; }
    .tab-inactive { color: #6b7280; border-bottom: 3px solid transparent; }
    
    /* استایل‌های اختصاصی برای اسکنر فول‌اسکرین مشابه تلگرام */
    #reader { width: 100%; border: none !important; background-color: #000; }
    #reader video { object-fit: cover; border-radius: 0 !important; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 flex justify-center min-h-screen p-4 md:p-8">

  <div class="bg-white shadow-xl rounded-2xl w-full max-w-lg p-6 space-y-6 relative">
    
    <!-- هدر نرم‌افزار -->
    <div class="text-center">
      <h2 class="text-2xl font-bold text-blue-600 mb-1">📦 دستیار هوشمند انبار</h2>
    </div>

    <!-- تب ها -->
    <div class="flex border-b border-gray-200">
      <button onclick="switchTab('location')" id="tab-btn-location" class="flex-1 pb-2 tab-active transition">📍 جانمایی کالا</button>
      <button onclick="switchTab('stocktaking')" id="tab-btn-stocktaking" class="flex-1 pb-2 tab-inactive transition">📋 انبارگردانی</button>
    </div>

    <!-- ========================================== -->
    <!-- تب ۱: جانمایی کالا -->
    <!-- ========================================== -->
    <div id="tab-location" class="space-y-6 block">
      
      <div class="flex gap-2 justify-center">
        <button onclick="startScanner('location')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl transition shadow text-sm font-bold flex justify-center items-center gap-2">
          📷 اسکن بارکد
        </button>
      </div>

      <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
        <label class="block text-sm text-gray-700 mb-2 font-medium">جستجوی دستی (نام یا کد):</label>
        <div class="flex gap-2">
          <div class="relative flex-1">
            <input type="text" id="manualInput" oninput="handleLiveSearch()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition" placeholder="مثلاً: مته..." autocomplete="off">
            <ul id="suggestionsList" class="hidden absolute z-40 w-full bg-white border border-gray-200 shadow-xl max-h-60 rounded-lg overflow-y-auto mt-1 divide-y divide-gray-100"></ul>
          </div>
          <button onclick="searchManual()" class="bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-lg text-sm transition shadow font-bold">جستجو</button>
        </div>
      </div>

      <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 text-center">
        <button onclick="fetchData()" id="refreshBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm transition shadow w-full font-bold">
          🔄 دریافت آخرین دیتا از سرور
        </button>
        <div id="lastUpdateContainer" class="hidden mt-3 p-3 bg-blue-50 rounded-lg border border-blue-200">
          <p class="text-xs text-blue-800 font-medium" id="lastUpdateText"></p>
        </div>
      </div>

      <div id="result" class="hidden rounded-xl p-4 text-sm font-medium leading-relaxed border transition-all duration-300"></div>
    </div>

    <!-- ========================================== -->
    <!-- تب ۲: انبارگردانی -->
    <!-- ========================================== -->
    <div id="tab-stocktaking" class="space-y-6 hidden">
      
      <div class="flex gap-2 justify-center">
        <button onclick="startScanner('stocktaking')" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl transition shadow text-sm font-bold flex justify-center items-center gap-2">
          📷 اسکن برای ثبت شمارش
        </button>
        <button onclick="openStockModal()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-3 rounded-xl transition shadow text-sm font-bold">
          ✍️ ثبت دستی
        </button>
      </div>

      <!-- لیست موارد شمرده شده -->
      <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
        <div class="flex justify-between items-center mb-3 border-b pb-2">
          <h3 class="font-bold text-gray-700 text-sm">لیست شمارش‌های امروز:</h3>
          
          <div class="flex items-center gap-2">
            <span id="stockCountBadge" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2 py-1 rounded">۰ ردیف</span>
            <button onclick="deleteAllStockRecords()" class="bg-red-100 text-red-600 hover:bg-red-200 hover:text-red-800 px-2 py-1 rounded transition text-sm flex items-center gap-1 shadow-sm" title="پاک کردن کل لیست">
              🗑️ حذف همه
            </button>
          </div>

        </div>
        
        <div id="stocktakingList" class="space-y-2 max-h-60 overflow-y-auto pr-1">
          <p class="text-xs text-gray-400 text-center py-4">هنوز کالایی شمرده نشده است.</p>
        </div>
      </div>

      <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white w-full py-3 rounded-xl transition shadow text-sm font-bold flex justify-center items-center gap-2">
        📥 دانلود فایل اکسل (XLSX)
      </button>

    </div>
  </div>

  <!-- ========================================== -->
  <!-- فریم نمایش دوربین (طراحی جدید فول اسکرین) -->
  <!-- ========================================== -->
  <div id="reader-container" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <!-- هدر دوربین -->
    <div class="absolute top-0 w-full p-4 flex justify-between items-center z-50 bg-gradient-to-b from-black/80 to-transparent">
       <h3 class="text-white font-bold text-lg drop-shadow-md">اسکن بارکد</h3>
       <button onclick="stopScanner()" class="bg-white/20 hover:bg-white/30 backdrop-blur-md text-white p-2 rounded-full transition border border-white/30">
         <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
         </svg>
       </button>
    </div>
    
    <!-- محفظه اسکنر -->
    <div class="flex-1 flex justify-center items-center h-full w-full relative">
       <div id="reader" class="w-full h-full absolute inset-0"></div>
    </div>

    <!-- راهنمای پایین دوربین -->
    <div class="absolute bottom-10 w-full flex justify-center z-50 pointer-events-none">
       <span class="bg-black/60 backdrop-blur-md text-white px-6 py-2 rounded-full text-sm font-medium border border-white/20 shadow-lg">
          بارکد را درون کادر روشن قرار دهید
       </span>
    </div>
  </div>

  <!-- ========================================== -->
  <!-- پاپ آپ (Modal) فرم تگ انبارگردانی -->
  <!-- ========================================== -->
  <div id="stockModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-70 z-50 flex justify-center items-center p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
      
      <div class="bg-indigo-600 p-4 text-white flex justify-between items-center shrink-0">
        <h3 class="font-bold text-lg">📝 تگ انبارگردانی</h3>
        <button onclick="closeStockModal()" class="text-white hover:text-gray-200 text-xl font-bold">&times;</button>
      </div>

      <div class="p-5 space-y-4 overflow-y-auto flex-1">
        
        <div class="space-y-2 bg-gray-50 p-3 rounded-lg border border-gray-100">
          <div>
            <label class="block text-xs text-gray-500 font-bold mb-1">کد کالا</label>
            <input type="text" id="st_barcode" oninput="autoFillProductName()" class="w-full border border-gray-300 rounded p-2 text-sm text-left dir-ltr focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-bold mb-1">شرح کالا</label>
            <input type="text" id="st_name" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-500 font-bold mb-1">نام انبار</label>
            <input type="text" id="st_warehouse" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-bold mb-1">شماره بخش</label>
            <input type="text" id="st_section" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
          <div class="col-span-2">
            <label class="block text-xs text-indigo-600 font-bold mb-1">تعداد شمارش (موجودی واقعی)</label>
            <input type="number" id="st_count" class="w-full border-2 border-indigo-300 rounded p-2 text-lg font-bold text-center focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 bg-gray-50 p-3 rounded-lg border border-gray-100">
          <div>
            <label class="block text-xs text-gray-500 font-bold mb-1">ثبت کننده</label>
            <input type="text" id="st_registrar" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-bold mb-1">کنترل کننده</label>
            <input type="text" id="st_controller" class="w-full border border-gray-300 rounded p-2 text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
          </div>
        </div>

      </div>

      <div class="p-4 border-t bg-gray-50 shrink-0">
        <button onclick="saveStockData()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow transition">
          ✅ تایید و ثبت در لیست
        </button>
      </div>

    </div>
  </div>

  <script>
    // ==========================================
    // ۱. تنظیمات دیتابیس ابری
    // ==========================================
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQMuYI529qvGmpXFevG7jZRChAjwxaqaFJJe-1dn3oy95WU5GWzZKrQxp9dr2o7U0ECL9niUEWx79f2/pub?output=csv";

    let products = [];
    let stocktakingRecords = []; 
    let activeTab = 'location';
    let currentScannerMode = 'location';

    window.onload = () => {
      fetchData();
      const savedStock = localStorage.getItem('stocktakingData');
      if(savedStock) {
        stocktakingRecords = JSON.parse(savedStock);
        renderStocktakingList();
      }
      
      document.getElementById('st_warehouse').value = localStorage.getItem('st_last_warehouse') || '';
      document.getElementById('st_section').value = localStorage.getItem('st_last_section') || '';
      document.getElementById('st_registrar').value = localStorage.getItem('st_last_registrar') || '';
      document.getElementById('st_controller').value = localStorage.getItem('st_last_controller') || '';
    };

    function fetchData() {
      const btn = document.getElementById("refreshBtn");
      if(btn) btn.innerText = "⏳ در حال دریافت...";

      fetch(GOOGLE_SHEET_CSV_URL)
        .then(response => response.text())
        .then(csvText => {
          Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            transformHeader: function(header) {
              return header.replace(/^\uFEFF/, '').trim().toLowerCase();
            },
            complete: function(results) {
              products = [];
              let sheetLastUpdate = "ثبت نشده در شیت"; 

              results.data.forEach((row, index) => {
                if (index === 0 && row.last_update && String(row.last_update).trim() !== "") {
                  sheetLastUpdate = String(row.last_update).trim();
                }
                if (row.barcode && row.name && row.stock !== undefined) {
                  products.push({
                    barcode: toEnglishDigits(String(row.barcode).trim()),
                    name: String(row.name).trim(),
                    stock: parseInt(toEnglishDigits(String(row.stock).trim())) || 0,
                    location: row.location && String(row.location).trim() !== "" ? String(row.location).trim() : "ثبت نشده"
                  });
                }
              });

              if(btn) btn.innerText = "🔄 دریافت آخرین دیتا از سرور";
              const updateContainer = document.getElementById("lastUpdateContainer");
              const updateText = document.getElementById("lastUpdateText");
              updateContainer.classList.remove("hidden");
              updateText.innerHTML = `🕒 آخرین آپدیت موجودی سرور:<br><strong class="block mt-1 text-blue-900 text-sm dir-ltr">${sheetLastUpdate}</strong>`;
              
              // بازگرداندن پاپ‌آپ خوشگل (حالت Toast)
              Swal.fire({
                toast: true,
                position: 'top',
                icon: 'success',
                title: 'اطلاعات با موفقیت بروزرسانی شد',
                showConfirmButton: false,
                timer: 2500,
                timerProgressBar: true
              });
            }
          });
        })
        .catch(error => {
          if(btn) btn.innerText = "🔄 دریافت آخرین دیتا از سرور";
          Swal.fire({
            icon: 'error',
            title: 'خطا در ارتباط',
            text: 'مشکلی در دریافت اطلاعات پیش آمد. اینترنت خود را بررسی کنید.'
          });
        });
    }

    // ==========================================
    // مدیریت تب‌ها
    // ==========================================
    function switchTab(tabName) {
      activeTab = tabName;
      document.getElementById('tab-location').classList.toggle('hidden', tabName !== 'location');
      document.getElementById('tab-stocktaking').classList.toggle('hidden', tabName !== 'stocktaking');
      
      document.getElementById('tab-btn-location').className = tabName === 'location' ? 'flex-1 pb-2 tab-active transition' : 'flex-1 pb-2 tab-inactive transition';
      document.getElementById('tab-btn-stocktaking').className = tabName === 'stocktaking' ? 'flex-1 pb-2 tab-active transition' : 'flex-1 pb-2 tab-inactive transition';
    }

    // ==========================================
    // عملیات انبارگردانی
    // ==========================================
    function openStockModal(scannedBarcode = '') {
      document.getElementById('st_barcode').value = scannedBarcode;
      document.getElementById('st_name').value = '';
      document.getElementById('st_count').value = '';
      
      if(scannedBarcode) {
        autoFillProductName(); 
      }

      document.getElementById('stockModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('st_count').focus(), 300);
    }

    function closeStockModal() {
      document.getElementById('stockModal').classList.add('hidden');
    }

    function autoFillProductName() {
      const barcodeValue = toEnglishDigits(document.getElementById('st_barcode').value.trim());
      const nameInput = document.getElementById('st_name');
      
      if (barcodeValue === '') {
        nameInput.value = '';
        return;
      }

      const foundProduct = products.find(p => p.barcode.toUpperCase() === barcodeValue.toUpperCase());
      if (foundProduct) {
        nameInput.value = foundProduct.name;
      }
    }

    function saveStockData() {
      const barcode = document.getElementById('st_barcode').value.trim();
      const name = document.getElementById('st_name').value.trim();
      const warehouse = document.getElementById('st_warehouse').value.trim();
      const section = document.getElementById('st_section').value.trim();
      const count = document.getElementById('st_count').value.trim();
      const registrar = document.getElementById('st_registrar').value.trim();
      const controller = document.getElementById('st_controller').value.trim();

      if(!barcode || !name || count === '') {
        Swal.fire('خطا', 'کد کالا، شرح و تعداد شمارش الزامی است!', 'error');
        return;
      }

      localStorage.setItem('st_last_warehouse', warehouse);
      localStorage.setItem('st_last_section', section);
      localStorage.setItem('st_last_registrar', registrar);
      localStorage.setItem('st_last_controller', controller);

      const record = { barcode, name, warehouse, section, count, registrar, controller, time: new Date().toLocaleTimeString('fa-IR') };
      
      stocktakingRecords.unshift(record);
      localStorage.setItem('stocktakingData', JSON.stringify(stocktakingRecords));

      renderStocktakingList();
      closeStockModal();
      playSuccessFeedback();
    }

    function renderStocktakingList() {
      const listDiv = document.getElementById('stocktakingList');
      const badge = document.getElementById('stockCountBadge');
      
      badge.innerText = `${stocktakingRecords.length} ردیف`;

      if(stocktakingRecords.length === 0) {
        listDiv.innerHTML = '<p class="text-xs text-gray-400 text-center py-4">هنوز کالایی شمرده نشده است.</p>';
        return;
      }

      let html = '';
      stocktakingRecords.forEach((item, index) => {
        html += `
          <div class="bg-white p-3 rounded border border-gray-200 shadow-sm flex justify-between items-center">
            <div class="overflow-hidden pr-2">
              <div class="text-sm font-bold text-gray-800 truncate">${item.name}</div>
              <div class="text-xs text-gray-500 font-mono mt-1">${item.barcode} | ${item.warehouse} - ${item.section}</div>
            </div>
            <div class="bg-indigo-100 text-indigo-800 font-black px-3 py-2 rounded-lg text-lg shrink-0">
              ${item.count}
            </div>
            <button onclick="deleteStockRecord(${index})" class="ml-2 text-red-500 hover:bg-red-50 p-2 rounded shrink-0">🗑️</button>
          </div>
        `;
      });
      listDiv.innerHTML = html;
    }

    function deleteStockRecord(index) {
      if(confirm('آیا از حذف این رکورد مطمئن هستید؟')) {
        stocktakingRecords.splice(index, 1);
        localStorage.setItem('stocktakingData', JSON.stringify(stocktakingRecords));
        renderStocktakingList();
      }
    }

    function deleteAllStockRecords() {
      if (stocktakingRecords.length === 0) {
        Swal.fire('لیست خالی است', 'چیزی برای پاک کردن وجود ندارد.', 'info');
        return;
      }

      Swal.fire({
        title: 'حذف کل لیست؟',
        text: "آیا مطمئن هستید؟ تمام شمارش‌های این لیست پاک خواهد شد و قابل بازگشت نیست!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'بله، همه را پاک کن!',
        cancelButtonText: 'انصراف'
      }).then((result) => {
        if (result.isConfirmed) {
          stocktakingRecords = []; 
          localStorage.removeItem('stocktakingData'); 
          renderStocktakingList(); 
          Swal.fire('پاک شد!', 'لیست شمارش‌ها با موفقیت خالی شد.', 'success');
        }
      });
    }

    // ==========================================
    // خروجی اکسل (XLSX)
    // ==========================================
    function exportToExcel() {
      if(stocktakingRecords.length === 0) {
        Swal.fire('لیست خالی است', 'هیچ دیتایی برای خروجی گرفتن وجود ندارد.', 'warning');
        return;
      }

      const excelData = stocktakingRecords.map(row => ({
        "کد کالا": row.barcode,
        "شرح کالا": row.name,
        "نام انبار": row.warehouse,
        "شماره بخش": row.section,
        "تعداد شمارش": Number(row.count),
        "ثبت کننده": row.registrar,
        "کنترل کننده": row.controller,
        "زمان ثبت": row.time
      }));

      const worksheet = XLSX.utils.json_to_sheet(excelData);

      if(!worksheet['!dir']) worksheet['!dir'] = 'rtl';

      const wscols = [
        {wch: 15}, {wch: 35}, {wch: 15}, {wch: 10}, 
        {wch: 12}, {wch: 15}, {wch: 15}, {wch: 12}  
      ];
      worksheet['!cols'] = wscols;

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "انبارگردانی");

      const dateStr = new Date().toLocaleDateString('fa-IR').replace(/\//g, '-');
      XLSX.writeFile(workbook, `Stocktaking_${dateStr}.xlsx`);
    }

    // ==========================================
    // توابع کمکی و جستجو و دوربین
    // ==========================================
    function toEnglishDigits(str) {
      if(!str) return "";
      return str.replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
    }

    function playSuccessFeedback() {
      if (navigator.vibrate) navigator.vibrate(200); 
    }

    document.addEventListener('click', function(e) {
      const input = document.getElementById('manualInput');
      const list = document.getElementById('suggestionsList');
      if (input && list && !input.contains(e.target) && !list.contains(e.target)) {
        list.classList.add('hidden');
      }
    });

    function handleLiveSearch() {
      const inputText = document.getElementById("manualInput").value.trim();
      const list = document.getElementById("suggestionsList");
      if (!inputText) { list.classList.add("hidden"); return; }
      const text = toEnglishDigits(inputText);
      const matches = products.filter(p => p.barcode.toUpperCase().includes(text.toUpperCase()) || p.name.includes(text));
      if (matches.length === 0) { list.classList.add("hidden"); return; }
      list.innerHTML = "";
      matches.forEach(product => {
        const li = document.createElement("li");
        li.className = "px-4 py-3 hover:bg-blue-50 cursor-pointer transition flex justify-between items-start gap-3";
        const nameSpan = document.createElement("span");
        nameSpan.className = "text-sm text-gray-800 font-medium leading-relaxed flex-1 break-words";
        nameSpan.innerText = product.name;
        const stockSpan = document.createElement("span");
        stockSpan.className = "text-xs text-blue-600 bg-blue-100 px-2 py-1 rounded font-bold shrink-0 mt-0.5";
        stockSpan.innerText = product.stock;
        li.appendChild(nameSpan); li.appendChild(stockSpan);
        li.onclick = () => {
          document.getElementById("manualInput").value = product.name;
          list.classList.add("hidden");
          showResult([product]);
        };
        list.appendChild(li);
      });
      list.classList.remove("hidden");
    }

    function showResult(matchedProducts, searchedText = null) {
      const resultDiv = document.getElementById("result");
      resultDiv.classList.remove("hidden", "bg-gray-50", "border-gray-300", "bg-red-50", "border-red-300", "text-red-900");
      let html = "";
      if (searchedText) html += `<div class="mb-3 text-gray-500 text-xs">🔍 جستجو برای: <span class="font-bold text-gray-800">${searchedText}</span></div>`;
      if (matchedProducts && matchedProducts.length > 0) {
        playSuccessFeedback();
        resultDiv.classList.add("bg-gray-50", "border-gray-300");
        html += `<div class="mb-4 text-green-600 font-bold text-lg">✅ ${matchedProducts.length} کالا یافت شد:</div><div class="space-y-3">`;
        matchedProducts.forEach(product => {
          html += `
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden">
              <div class="text-lg font-bold text-gray-800 mb-2 leading-tight">${product.name}</div>
              <div class="flex flex-col gap-2 mb-3 pb-3 border-b border-gray-100">
                <div class="text-sm text-gray-500 font-mono">🔖 کد: <span class="font-bold text-gray-700">${product.barcode}</span></div>
                <div class="text-sm text-blue-700 bg-blue-50 px-2 py-1.5 rounded inline-flex items-center gap-1 w-fit">
                  📍 جانمایی: <span class="font-bold">${product.location}</span>
                </div>
              </div>
              <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-100">
                <span class="text-blue-800 font-semibold">📦 موجودی انبار:</span>
                <span class="text-2xl font-black text-blue-600">${product.stock}</span>
              </div>
            </div>`;
        });
        html += `</div>`;
      } else {
        resultDiv.classList.add("bg-red-50", "border-red-300", "text-red-900");
        html += `<div class="flex items-center gap-2 text-base font-bold"><span>❌</span> متاسفانه چیزی پیدا نشد.</div>`;
      }
      resultDiv.innerHTML = html;
    }

    let qrScanner = null;
    function startScanner(mode) {
      currentScannerMode = mode;
      stopScanner();
      
      document.getElementById("reader-container").classList.remove("hidden");
      
      qrScanner = new Html5Qrcode("reader");
      
      qrScanner.start(
        { facingMode: "environment" },
        { 
          fps: 30, 
          qrbox: { width: 220, height: 220 }, 
          aspectRatio: window.innerHeight / window.innerWidth 
        },
        (decodedText) => {
          decodedText = toEnglishDigits(decodedText.trim());
          stopScanner();
          
          if(currentScannerMode === 'location') {
            const matches = products.filter(p => p.barcode.toUpperCase() === decodedText.toUpperCase());
            document.getElementById("manualInput").value = decodedText;
            showResult(matches, decodedText);
          } else if (currentScannerMode === 'stocktaking') {
            openStockModal(decodedText);
          }
        },
        (err) => {
        }
      ).catch(err => {
        Swal.fire('خطا', 'دوربین در دسترس نیست یا مجوز داده نشده است.', 'error');
        stopScanner();
      });
    }

    function stopScanner() {
      document.getElementById("reader-container").classList.add("hidden");
      if (qrScanner) {
        qrScanner.stop().catch(e => {});
        qrScanner = null;
      }
    }
  </script>
</body>
</html>
