<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📦 سیستم هوشمند جانمایی کالا</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>

  <style>
    body { font-family: Tahoma, Arial, sans-serif; }
    #reader video { border-radius: 12px; width: 100%; max-height: 300px; object-fit: cover; }
    /* استایل اختصاصی برای اسکرول‌بار لیست کشویی */
    #suggestionsList::-webkit-scrollbar { width: 6px; }
    #suggestionsList::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 flex justify-center min-h-screen p-4 md:p-8">

  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-6 space-y-6">
    
    <!-- هدر نرم‌افزار -->
    <div class="text-center">
      <h2 class="text-2xl font-bold text-blue-600 mb-1">📦 سیستم جانمایی کالا</h2>
      <p class="text-gray-500 text-sm">جستجو، اسکن و مدیریت موجودی انبار</p>
    </div>

    <!-- دکمه‌های کنترل دوربین -->
    <div class="flex gap-2 justify-center">
      <button onclick="startScanner()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl transition shadow text-sm font-bold flex justify-center items-center gap-2">
        📷 اسکن بارکد / QR
      </button>
      <button onclick="stopScanner()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-xl transition shadow text-sm font-bold">
        توقف
      </button>
    </div>

    <!-- فریم نمایش دوربین -->
    <div id="reader" class="hidden border-2 border-dashed border-blue-300 rounded-xl p-2 bg-blue-50"></div>

    <!-- بخش جستجوی دستی (تغییر یافته برای جستجوی زنده) -->
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
      <label class="block text-sm text-gray-700 mb-2 font-medium">جستجوی دستی (نام یا کد):</label>
      <div class="flex gap-2">
        
        <!-- کادر جستجو و لیست کشویی -->
        <div class="relative flex-1">
          <input type="text" id="manualInput" oninput="handleLiveSearch()" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition" placeholder="مثلاً: مته خزینه..." autocomplete="off">
          
          <!-- لیست کشویی پیشنهادات -->
          <ul id="suggestionsList" class="hidden absolute z-50 w-full bg-white border border-gray-200 shadow-xl max-h-48 rounded-lg overflow-y-auto mt-1 divide-y divide-gray-100">
            <!-- آیتم‌ها توسط جاوااسکریپت اینجا قرار می‌گیرند -->
          </ul>
        </div>

        <button onclick="searchManual()" class="bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-lg text-sm transition shadow font-bold">
          جستجو 🔍
        </button>
      </div>
    </div>

    <!-- بخش اتصال به گوگل شیت -->
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 text-center">
      <button onclick="fetchData()" id="refreshBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm transition shadow w-full font-bold">
        🔄 دریافت آخرین دیتا از سرور
      </button>
      
      <!-- نمایش تاریخ واقعی آپدیت دیتابیس با رنگ آبی -->
      <div id="lastUpdateContainer" class="hidden mt-3 p-3 bg-blue-50 rounded-lg border border-blue-200">
        <p class="text-xs text-blue-800 font-medium" id="lastUpdateText"></p>
      </div>
      
      <p class="text-[10px] text-gray-400 mt-2">اتصال به اینترنت برای آپدیت الزامی است.</p>
    </div>

    <!-- کادر نمایش نتیجه -->
    <div id="result" class="hidden rounded-xl p-4 text-sm font-medium leading-relaxed border transition-all duration-300"></div>

  </div>

  <script>
    // ==========================================
    // ۱. تنظیمات دیتابیس ابری
    // ==========================================
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQMuYI529qvGmpXFevG7jZRChAjwxaqaFJJe-1dn3oy95WU5GWzZKrQxp9dr2o7U0ECL9niUEWx79f2/pub?output=csv";

    let products = [];

    function fetchData() {
      const btn = document.getElementById("refreshBtn");
      if(btn) btn.innerText = "⏳ در حال دریافت...";

      fetch(GOOGLE_SHEET_CSV_URL)
        .then(response => response.text())
        .then(csvText => {
          Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            transformHeader: function(header) {
              return header.replace(/^\uFEFF/, '').trim().toLowerCase();
            },
            complete: function(results) {
              products = [];
              let sheetLastUpdate = "ثبت نشده در شیت"; 

              results.data.forEach((row, index) => {
                if (index === 0 && row.last_update && String(row.last_update).trim() !== "") {
                  sheetLastUpdate = String(row.last_update).trim();
                }

                if (row.barcode && row.name && row.stock !== undefined) {
                  products.push({
                    barcode: toEnglishDigits(String(row.barcode).trim()),
                    name: String(row.name).trim(),
                    stock: parseInt(toEnglishDigits(String(row.stock).trim())) || 0,
                    location: row.location && String(row.location).trim() !== "" ? String(row.location).trim() : "ثبت نشده"
                  });
                }
              });

              if(btn) btn.innerText = "🔄 دریافت آخرین دیتا از سرور";
              
              const updateContainer = document.getElementById("lastUpdateContainer");
              const updateText = document.getElementById("lastUpdateText");
              updateContainer.classList.remove("hidden");
              updateText.innerHTML = `🕒 آخرین آپدیت موجودی سرور:<br><strong class="block mt-1 text-blue-900 text-sm dir-ltr">${sheetLastUpdate}</strong>`;
              
              if(products.length === 0) {
                 Swal.fire('لیست خالی!', 'فایل خوانده شد اما کالایی پیدا نشد.', 'warning');
              } else {
                 Swal.fire({
                   icon: 'success',
                   title: 'بروزرسانی موفق',
                   text: `دیتا با موفقیت دریافت شد.`,
                   timer: 1500,
                   showConfirmButton: false
                 });
              }
            }
          });
        })
        .catch(error => {
          if(btn) btn.innerText = "🔄 دریافت آخرین دیتا از سرور";
          Swal.fire('خطا', 'مشکل در ارتباط با سرور. اینترنت خود را بررسی کنید.', 'error');
        });
    }

    window.onload = fetchData;

    // ==========================================
    // ۲. توابع کمکی
    // ==========================================
    function toEnglishDigits(str) {
      if(!str) return "";
      return str.replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
    }

    function playSuccessFeedback() {
      if (navigator.vibrate) navigator.vibrate(200); 
    }

    // بستن لیست کشویی وقتی بیرون از آن کلیک می‌شود
    document.addEventListener('click', function(e) {
      const input = document.getElementById('manualInput');
      const list = document.getElementById('suggestionsList');
      if (input && list && !input.contains(e.target) && !list.contains(e.target)) {
        list.classList.add('hidden');
      }
    });

    // ==========================================
    // ۳. جستجوی زنده (Live Search) - جدید
    // ==========================================
    function handleLiveSearch() {
      const inputText = document.getElementById("manualInput").value.trim();
      const list = document.getElementById("suggestionsList");
      
      if (!inputText) {
        list.classList.add("hidden");
        return;
      }

      const text = toEnglishDigits(inputText);
      const matches = products.filter(p => 
        p.barcode.toUpperCase().includes(text.toUpperCase()) || 
        p.name.includes(text)
      );

      if (matches.length === 0) {
        list.classList.add("hidden");
        return;
      }

      // ساخت آیتم‌های لیست کشویی
      list.innerHTML = "";
      matches.forEach(product => {
        const li = document.createElement("li");
        li.className = "px-4 py-3 hover:bg-blue-50 cursor-pointer transition flex justify-between items-center";
        
        // نام کالا
        const nameSpan = document.createElement("span");
        nameSpan.className = "text-sm text-gray-800 font-medium truncate w-3/4";
        nameSpan.innerText = product.name;
        
        // موجودی کوچک در کنار آن
        const stockSpan = document.createElement("span");
        stockSpan.className = "text-xs text-blue-600 bg-blue-100 px-2 py-1 rounded font-bold";
        stockSpan.innerText = product.stock;

        li.appendChild(nameSpan);
        li.appendChild(stockSpan);

        // با کلیک روی آیتم، کالا انتخاب می‌شود
        li.onclick = () => {
          document.getElementById("manualInput").value = product.name;
          list.classList.add("hidden");
          showResult([product]); // نمایش اطلاعات فقط همین کالا
        };

        list.appendChild(li);
      });

      list.classList.remove("hidden");
    }

    // ==========================================
    // ۴. نمایش نتایج
    // ==========================================
    function showResult(matchedProducts, searchedText = null) {
      const resultDiv = document.getElementById("result");
      resultDiv.classList.remove("hidden", "bg-gray-50", "border-gray-300", "bg-red-50", "border-red-300", "text-red-900");

      let html = "";
      
      if (searchedText) {
        html += `<div class="mb-3 text-gray-500 text-xs">🔍 جستجو برای: <span class="font-bold text-gray-800">${searchedText}</span></div>`;
      }

      if (matchedProducts && matchedProducts.length > 0) {
        playSuccessFeedback();
        resultDiv.classList.add("bg-gray-50", "border-gray-300");
        
        html += `<div class="mb-4 text-green-600 font-bold text-lg">✅ ${matchedProducts.length} کالا یافت شد:</div>`;
        
        html += `<div class="space-y-3">`;
        matchedProducts.forEach(product => {
          html += `
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden">
              <div class="text-lg font-bold text-gray-800 mb-2 leading-tight">${product.name}</div>
              
              <div class="flex flex-col gap-2 mb-3 pb-3 border-b border-gray-100">
                <div class="text-sm text-gray-500 font-mono">🔖 کد: <span class="font-bold text-gray-700">${product.barcode}</span></div>
                <div class="text-sm text-blue-700 bg-blue-50 px-2 py-1.5 rounded inline-flex items-center gap-1 w-fit">
                  📍 جانمایی: <span class="font-bold">${product.location}</span>
                </div>
              </div>
              
              <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg border border-blue-100">
                <span class="text-blue-800 font-semibold">📦 موجودی انبار:</span>
                <span class="text-2xl font-black text-blue-600">${product.stock}</span>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      } else {
        resultDiv.classList.add("bg-red-50", "border-red-300", "text-red-900");
        html += `<div class="flex items-center gap-2 text-base font-bold"><span>❌</span> متاسفانه چیزی پیدا نشد.</div>`;
      }

      resultDiv.innerHTML = html;
    }

    // ==========================================
    // ۵. جستجوی دستی (با زدن دکمه جستجو)
    // ==========================================
    function searchManual() {
      let text = document.getElementById("manualInput").value.trim();
      if(!text) return;
      
      // پنهان کردن کشویی هنگام کلیک روی دکمه جستجو
      document.getElementById("suggestionsList").classList.add("hidden");

      text = toEnglishDigits(text);
      let matches = products.filter(p => 
        p.barcode.toUpperCase().includes(text.toUpperCase()) || 
        p.name.includes(text)
      );
      
      showResult(matches, text);
    }

    // ==========================================
    // ۶. مدیریت دوربین
    // ==========================================
    let qrScanner = null;
    function startScanner() {
      stopScanner();
      document.getElementById("reader").classList.remove("hidden");
      qrScanner = new Html5Qrcode("reader");
      
      qrScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          decodedText = toEnglishDigits(decodedText.trim());
          const matches = products.filter(p => p.barcode.toUpperCase() === decodedText.toUpperCase());
          document.getElementById("manualInput").value = decodedText;
          showResult(matches, decodedText);
          stopScanner();
        },
        (err) => {}
      ).catch(err => {
        Swal.fire('خطا', 'دوربین در دسترس نیست.', 'error');
      });
    }

    function stopScanner() {
      document.getElementById("reader").classList.add("hidden");
      if (qrScanner) {
        qrScanner.stop().catch(e => {});
        qrScanner = null;
      }
    }
  </script>
</body>
</html>
