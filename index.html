<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📦 سیستم هوشمند جانمایی کالا</title>

  <!-- Tailwind CSS برای استایل‌دهی سریع و مدرن -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- SweetAlert2 برای پیام‌های هشدار و موفقیت زیبا -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- کتابخانه‌های اسکن و پردازش -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
  <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>

  <style>
    body { font-family: Tahoma, Arial, sans-serif; }
    #reader video, #camera video { border-radius: 12px; width: 100%; max-height: 300px; object-fit: cover; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 flex justify-center min-h-screen p-4 md:p-8">

  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-6 space-y-6">
    
    <!-- هدر نرم‌افزار -->
    <div class="text-center">
      <h2 class="text-2xl font-bold text-blue-600 mb-1">📦 سیستم جانمایی کالا</h2>
      <p class="text-gray-500 text-sm">جستجو، اسکن و مدیریت موجودی انبار</p>
    </div>

    <!-- دکمه‌های کنترل دوربین -->
    <div class="flex gap-2 justify-center">
      <button onclick="startQR()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2.5 rounded-xl transition shadow text-sm font-medium">
        اسکن QR
      </button>
      <button onclick="startBarcode()" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-2.5 rounded-xl transition shadow text-sm font-medium">
        اسکن بارکد
      </button>
      <button onclick="stopScanners()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-xl transition shadow text-sm font-medium">
        توقف دوربین
      </button>
    </div>

    <!-- فریم‌های نمایش دوربین -->
    <div id="reader" class="hidden border-2 border-dashed border-gray-300 rounded-xl p-2 bg-gray-50"></div>
    <div id="camera" class="hidden border-2 border-dashed border-gray-300 rounded-xl p-2 bg-gray-50"></div>

    <!-- بخش جستجوی دستی -->
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
      <label class="block text-sm text-gray-700 mb-2 font-medium">جستجوی دستی:</label>
      <div class="flex gap-2">
        <input type="text" id="manualInput" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none transition" placeholder="کد یا نام کالا...">
        <button onclick="searchManual()" class="bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg text-sm transition shadow">
          جستجو 🔍
        </button>
      </div>
    </div>

    <!-- بخش اتصال به گوگل شیت (ابری) -->
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 text-center">
      <p class="text-sm text-gray-700 mb-3 font-medium">☁️ اتصال به سرور ابری برقرار است</p>
      <button onclick="fetchData()" id="refreshBtn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm transition shadow w-full font-bold">
        🔄 دریافت آخرین موجودی
      </button>
      <p class="text-xs text-gray-400 mt-2">موجودی به محض باز شدن برنامه به‌صورت خودکار آپدیت می‌شود.</p>
    </div>

    <!-- کادر نمایش نتیجه -->
    <div id="result" class="hidden rounded-xl p-4 text-sm font-medium leading-relaxed border transition-all duration-300"></div>

  </div>

  <script>
    // --- ۱. آدرس فایل گوگل شیت شما ---
    // لینک CSV که از گوگل شیت کپی کردید را دقیقاً بین دو کوتیشن زیر قرار دهید:
    const GOOGLE_SHEET_CSV_URL = "لینک_گوگل_شیت_خود_را_اینجا_قرار_دهید";

    let products = [];

    // --- ۲. دریافت خودکار داده‌ها از سرور گوگل ---
    function fetchData() {
      const btn = document.getElementById("refreshBtn");
      if(btn) btn.innerText = "⏳ در حال دریافت اطلاعات...";

      fetch(GOOGLE_SHEET_CSV_URL)
        .then(response => response.text())
        .then(csvText => {
          Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
              products = []; // پاک کردن دیتای قدیمی
              results.data.forEach(row => {
                if (row.barcode && row.name && row.stock) {
                  products.push({
                    barcode: toEnglishDigits(String(row.barcode).trim()),
                    name: String(row.name).trim(),
                    stock: parseInt(toEnglishDigits(String(row.stock).trim()))
                  });
                }
              });

              if(btn) btn.innerText = "🔄 دریافت آخرین موجودی";
              
              Swal.fire({
                icon: 'success',
                title: 'بروزرسانی موفق',
                text: 'آخرین موجودی انبار دریافت شد.',
                timer: 1500,
                showConfirmButton: false
              });
            }
          });
        })
        .catch(error => {
          if(btn) btn.innerText = "🔄 دریافت آخرین موجودی";
          Swal.fire('خطا در اتصال', 'لطفاً اینترنت گوشی را بررسی کنید.', 'error');
        });
    }

    // فراخوانی خودکار این تابع به محض باز شدن برنامه در گوشی
    window.onload = fetchData;

    // --- ۳. توابع کمکی ---
    function toEnglishDigits(str) {
      return str.replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
    }

    function playSuccessFeedback() {
      if (navigator.vibrate) navigator.vibrate(200); 
    }

    // --- ۴. نمایش رابط کاربری نتیجه ---
    function showResult(product, scannedCode = null) {
      const resultDiv = document.getElementById("result");
      resultDiv.classList.remove("hidden", "bg-green-50", "border-green-300", "text-green-900", "bg-red-50", "border-red-300", "text-red-900");

      let html = "";
      if (scannedCode) {
        html += `<div class="mb-3 text-gray-500 text-xs">🔍 کد جستجو شده: <span class="font-bold text-gray-800">${scannedCode}</span></div>`;
      }

      if (product) {
        playSuccessFeedback();
        resultDiv.classList.add("bg-green-50", "border-green-300", "text-green-900");
        html += `
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xl">✅</span>
            <span class="text-lg font-bold">${product.name}</span>
          </div>
          <div class="mt-3 p-3 bg-white rounded-lg border border-green-200 flex justify-between items-center shadow-sm">
            <span class="text-gray-600">📦 موجودی فعلی:</span>
            <span class="text-2xl font-black text-blue-600">${product.stock}</span>
          </div>
        `;
      } else {
        resultDiv.classList.add("bg-red-50", "border-red-300", "text-red-900");
        html += `<div class="flex items-center gap-2 text-base"><span>❌</span> این کالا در سیستم ثبت نشده است.</div>`;
      }

      resultDiv.innerHTML = html;
    }

    // جستجوی متنی
    function searchManual() {
      let text = document.getElementById("manualInput").value.trim();
      if(!text) return;
      
      text = toEnglishDigits(text);
      let product = products.find(p => p.barcode === text || p.name.includes(text));
      showResult(product, text);
    }

    // --- ۵. توابع اسکنر (QR و Barcode) ---
    let qrScanner = null;

    function startQR() {
      stopScanners();
      document.getElementById("reader").classList.remove("hidden");
      qrScanner = new Html5Qrcode("reader");
      qrScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          decodedText = toEnglishDigits(decodedText.trim());
          const product = products.find(p => p.barcode.toUpperCase() === decodedText.toUpperCase());
          showResult(product, decodedText);
          stopScanners();
        },
        (err) => {}
      ).catch(err => {
        Swal.fire('خطا', 'دوربین در دسترس نیست یا مجوز داده نشده.', 'error');
      });
    }

    function startBarcode() {
      stopScanners();
      document.getElementById("camera").classList.remove("hidden");
      Quagga.init({
        inputStream: {
          type: "LiveStream",
          target: document.querySelector('#camera'),
          constraints: { facingMode: "environment" }
        },
        decoder: { readers: ["code_128_reader", "code_39_reader", "ean_reader", "upc_reader"] }
      }, function(err) {
        if (err) {
          Swal.fire('خطا', 'دوربین در دسترس نیست.', 'error');
          return;
        }
        Quagga.start();
      });

      Quagga.onDetected(function(result) {
        const code = toEnglishDigits(result.codeResult.code.trim());
        const product = products.find(p => p.barcode.toUpperCase() === code.toUpperCase());
        showResult(product, code);
        stopScanners();
      });
    }

    function stopScanners() {
      document.getElementById("reader").classList.add("hidden");
      document.getElementById("camera").classList.add("hidden");
      if (qrScanner) {
        qrScanner.stop().catch(e => {});
        qrScanner = null;
      }
      try { Quagga.stop(); } catch(e){}
    }
  </script>
</body>
</html>
